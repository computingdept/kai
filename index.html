<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phaser 4x4 Room Grid - Walking Character</title>

 

    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

 

    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

 

        canvas {
            border: 2px solid white;
        }
</style>
</head>
<body>

 

<script>

 

// =====================================================
// ROOM SETTINGS
// =====================================================

 

const TILE_SIZE = 96;
const ROOM_SIZE = 10;
const ROOM_PIXELS = ROOM_SIZE * TILE_SIZE;

 

// 4x4 room world
const WORLD_WIDTH = 10;
const WORLD_HEIGHT = 10;



// =====================================================
// SCENE
// =====================================================

 

class GameScene extends Phaser.Scene {

 

    constructor() {
        super();

 

        // Start in room A1
        this.roomX = 0;
        this.roomY = 0;


    }

 

    create() {

 

        // Arrow keys
        this.cursors =
            this.input.keyboard.createCursorKeys();

 

        // Static wall collection
        this.wallGroup =
            this.physics.add.staticGroup();

 

        // Create room label
        this.roomText = this.add.text(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2,
            "",
            {
                fontSize: "48px",
                color: "#ffffff"
            }
        );

 

        this.roomText.setOrigin(0.5);

 

        // Draw starting room
        this.drawRoom();

 

        // Create player character instead of a square
        this.createPlayerCharacter(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2
        );

 

        // Give the character a physics body.
        // This is the invisible collision box used by Phaser.
        // The shapes are only what we see on the screen.
        this.physics.add.existing(this.player);

 

        // Set the collision box size.
        // This stops the character colliding using the whole container.
        this.player.body.setSize(30, 44);

 

        // Move the collision box so it lines up with the character.
        this.player.body.setOffset(-15, -24);

 

        // We allow the player to leave the edge of the screen
        // because that is how they move into another room.
        this.player.body.setCollideWorldBounds(false);

 

        // Player collides with walls
        this.physics.add.collider(
            this.player,
            this.wallGroup
        );
    }

 

    // =====================================================
    // PLAYER CHARACTER
    // =====================================================

 

    createPlayerCharacter(x, y) {

 

        // This function makes our player character.
        // It uses Phaser shapes instead of an image file.
        // This means the game still works even if we do not
        // have a separate sprite sheet or PNG image.

 

        // A container is like a folder for game objects.
        // We put the head, body, arms and legs inside it.
        // Then we can move the whole character by moving
        // just the container.
        this.player = this.add.container(x, y);

 

        // -------------------------
        // SHADOW
        // -------------------------

 

        // The shadow is only visual.
        // It makes the character look like it is standing
        // on the floor.
        this.shadow = this.add.ellipse(
            0,          // x position inside the player
            25,         // y position inside the player
            36,         // width
            10,         // height
            0x000000,   // black colour
            0.35        // transparency
        );

 

        // -------------------------
        // LEGS
        // -------------------------

 

        // These are rectangles.
        // Later, we move them up and down slightly
        // to make the character look like it is walking.
        this.leftLeg = this.add.rectangle(
            -7,         // left of the centre
            20,         // lower part of the body
            8,          // leg width
            24,         // leg height
            0x1f3a5f    // dark blue
        );

 

        this.rightLeg = this.add.rectangle(
            7,          // right of the centre
            20,
            8,
            24,
            0x1f3a5f
        );

 

        // -------------------------
        // BODY / COSTUME
        // -------------------------

 

        // This is the main shirt / costume.
        // You can change the colour to create
        // a different outfit.
        this.bodyShape = this.add.rectangle(
            0,          // centre of the player
            0,
            26,
            32,
            0x1abc9c    // green-blue costume
        );

 

        // -------------------------
        // ARMS
        // -------------------------

 

        // The arms also move during the walking animation.
        // When one leg moves forward, the opposite arm moves too.
        this.leftArm = this.add.rectangle(
            -18,
            0,
            7,
            24,
            0xffcc99    // skin colour
        );

 

        this.rightArm = this.add.rectangle(
            18,
            0,
            7,
            24,
            0xffcc99
        );

 

        // -------------------------
        // HEAD AND FACE
        // -------------------------

 

        this.head = this.add.circle(
            0,
            -25,
            14,
            0xffcc99
        );

 

        this.hair = this.add.rectangle(
            0,
            -36,
            22,
            7,
            0x3b2414
        );

 

        this.leftEye = this.add.circle(
            -5,
            -26,
            2,
            0x000000
        );

 

        this.rightEye = this.add.circle(
            5,
            -26,
            2,
            0x000000
        );
this.hat = this.add.rectangle(
            0,
            -45,
            20,
            10,
            0xff00ff
        );
this.hat2 = this.add.rectangle(
            0,
            -40,
            30,
           5,
            0xff00ff
        );
 

        // -------------------------
        // ADD PARTS TO THE PLAYER
        // -------------------------

 

        // The order matters.
        // Objects added first are drawn behind later objects.
        // That is why the shadow and legs are added first,
        // and the face is added last.
        this.player.add([
            this.shadow,
            this.leftLeg,
            this.rightLeg,
            this.leftArm,
            this.rightArm,
            this.bodyShape,
            this.head,
            this.hair,
            this.leftEye,
            this.rightEye,
this.hat,
this.hat2
        ]);

 

        // These variables control the walking animation.
        // walkTimer counts how much time has passed.
        // walkFrame stores which walking pose is showing.
        this.walkTimer = 0;
        this.walkFrame = 0;
    }

 

    animatePlayer(isMoving, delta) {

 

        // This function is called every frame from update().
        // isMoving is true when an arrow key is being pressed.
        // delta tells us how many milliseconds have passed
        // since the last frame.

 

        if (isMoving) {

 

            // Add the frame time to the walking timer.
            this.walkTimer += delta;

 

            // Every 120 milliseconds, swap walking pose.
            // This gives us a simple two-frame animation.
            if (this.walkTimer > 120) {

 

                this.walkTimer = 0;

 

                // This changes 0 to 1, or 1 back to 0.
                this.walkFrame = 1 - this.walkFrame;
            }

 

            // Pose 1:
            // one leg is slightly higher,
            // and the opposite arm is slightly higher.
            if (this.walkFrame === 0) {

 

                this.leftLeg.y = 18;
                this.rightLeg.y = 23;

 

                this.leftArm.y = 4;
                this.rightArm.y = -4;
            }

 

            // Pose 2:
            // swap the arms and legs around.
            else {

 

                this.leftLeg.y = 23;
                this.rightLeg.y = 18;

 

                this.leftArm.y = -4;
                this.rightArm.y = 4;
            }

 

            // Small bounce while walking.
            // Moving the body and head up a little makes
            // the walking feel more alive.
            this.bodyShape.y = -2;
            this.head.y = -27;
            this.hair.y = -38;
            this.leftEye.y = -28;
            this.rightEye.y = -28;
        }
        else {

 

            // If the player is not moving, reset everything
            // to a normal standing still pose.
            this.leftLeg.y = 20;
            this.rightLeg.y = 20;

 

            this.leftArm.y = 0;
            this.rightArm.y = 0;

 

            this.bodyShape.y = 0;
            this.head.y = -25;
            this.hair.y = -36;
            this.leftEye.y = -26;
            this.rightEye.y = -26;
        }
    }

 

    // =====================================================
    // ROOM NAME
    // =====================================================

 

    updateRoomLabel() {

 

        const letter =
            String.fromCharCode(65 + this.roomX);

 

        const number =
            this.roomY + 1;

 

        this.roomText.setText(
            `${letter}${number}`
        );
    }

 

    // =====================================================
    // WALL CREATION
    // =====================================================

 

    createWall(x, y) {

 

        const wall = this.add.rectangle(
            x,
            y,
            TILE_SIZE,
            TILE_SIZE,
            0x666666
        );

 

        this.physics.add.existing(
            wall,
            true
        );

 

        this.wallGroup.add(wall);
    }

 

    // =====================================================
    // ROOM DRAWING
    // =====================================================

 

    drawRoom() {

 

        // Remove previous room walls
        this.wallGroup.clear(true, true);

 

        const gap = Math.floor(ROOM_SIZE / 2);

 

        // Determine which neighbours exist
        const hasNorth =
            this.roomY > 0;

 

        const hasSouth =
            this.roomY < WORLD_HEIGHT - 1;

 

        const hasWest =
            this.roomX > 0;

 

        const hasEast =
            this.roomX < WORLD_WIDTH - 1;

 

        // -------------------------
        // TOP + BOTTOM WALLS
        // -------------------------

 

        for (let x = 0; x < ROOM_SIZE; x++) {

 

            // Top wall
            if (!(hasNorth && x === gap)) {

 

                this.createWall(
                    x * TILE_SIZE + TILE_SIZE / 2,
                    TILE_SIZE / 2
                );
            }

 

            // Bottom wall
            if (!(hasSouth && x === gap)) {

 

                this.createWall(
                    x * TILE_SIZE + TILE_SIZE / 2,
                    ROOM_PIXELS - TILE_SIZE / 2
                );
            }
        }

 

        // -------------------------
        // LEFT + RIGHT WALLS
        // -------------------------

 

        for (let y = 1; y < ROOM_SIZE - 1; y++) {

 

            // Left wall
            if (!(hasWest && y === gap)) {

 

                this.createWall(
                    TILE_SIZE / 2,
                    y * TILE_SIZE + TILE_SIZE / 2
                );
            }

 

            // Right wall
            if (!(hasEast && y === gap)) {

 

                this.createWall(
                    ROOM_PIXELS - TILE_SIZE / 2,
                    y * TILE_SIZE + TILE_SIZE / 2
                );
            }
        }

 

        this.updateRoomLabel();
    }

 

    // =====================================================
    // ROOM TRANSITIONS
    // =====================================================

 

    moveToRoom(dx, dy) {

 

        this.roomX += dx;
        this.roomY += dy;

 

        this.drawRoom();

 

        // Reposition player inside doorway

 

        if (dx === 1) {

 

            this.player.x =
                TILE_SIZE * 1.5;
        }

 

        if (dx === -1) {

 

            this.player.x =
                ROOM_PIXELS - TILE_SIZE * 1.5;
        }

 

        if (dy === 1) {

 

            this.player.y =
                TILE_SIZE * 1.5;
        }

 

        if (dy === -1) {

 

            this.player.y =
                ROOM_PIXELS - TILE_SIZE * 1.5;
        }
    }

 

    // =====================================================
    // GAME LOOP
    // =====================================================

 

    update(time, delta) {

 

        const speed = 220;

 

        // This starts as false.
        // It becomes true if any arrow key is pressed.
        // We use it to decide whether to play
        // the walking animation.
        let isMoving = false;

 

        this.player.body.setVelocity(0);

 

        if (this.cursors.left.isDown) {

 

            this.player.body.setVelocityX(
                -speed
            );

 

            this.player.scaleX = -1;
            isMoving = true;
        }

 

        if (this.cursors.right.isDown) {

 

            this.player.body.setVelocityX(
                speed
            );

 

            this.player.scaleX = 1;
            isMoving = true;
        }

 

        if (this.cursors.up.isDown) {

 

            this.player.body.setVelocityY(
                -speed
            );

 

            isMoving = true;
        }

 

        if (this.cursors.down.isDown) {

 

            this.player.body.setVelocityY(
                speed
            );

 

            isMoving = true;
        }

 

        this.animatePlayer(isMoving, delta);

 

        // -------------------------
        // ROOM CHANGES
        // -------------------------

 

        if (
            this.player.x < 0 &&
            this.roomX > 0
        ) {
            this.moveToRoom(-1, 0);
        }

 

        if (
            this.player.x > ROOM_PIXELS &&
            this.roomX < WORLD_WIDTH - 1
        ) {
            this.moveToRoom(1, 0);
        }

 

        if (
            this.player.y < 0 &&
            this.roomY > 0
        ) {
            this.moveToRoom(0, -1);
        }

 

        if (
            this.player.y > ROOM_PIXELS &&
            this.roomY < WORLD_HEIGHT - 1
        ) {
            this.moveToRoom(0, 1);
        }

// -------------------------
// END SCENE
// -------------------------

const leftX = ROOM_PIXELS / 2 - 20;
const leftY = ROOM_PIXELS / 2 - 20;
const closeEnough = 4;

const rightX = ROOM_PIXELS / 2 - 20;
const rightY = ROOM_PIXELS / 2 - 20;
const closeEnough2 = 4;

if (
this.roomX === WORLD_WIDTH - 1 &&
this.roomY === WORLD_HEIGHT - 1 &&
Math.abs(this.player.x - leftX) <= closeEnough &&
Math.abs(this.player.y - leftY) <= closeEnough
) {
alert("You win! thanks for playing");
this.scene.stop();
}
if (
this.roomX === WORLD_WIDTH - 1 &&
this.roomY === WORLD_HEIGHT - 1 &&
Math.abs(this.player.x - rightX) <= closeEnough2 &&
Math.abs(this.player.y - rightY) <= closeEnough2
) {
alert("You lose! better luck next time");
this.scene.stop();
}
}
}




// =====================================================
// GAME CONFIG
// =====================================================

 

const config = {
    type: Phaser.AUTO,

 

    width: ROOM_PIXELS,
    height: ROOM_PIXELS,

 

    backgroundColor: "#202020",

 

    physics: {
        default: "arcade",
        arcade: {
            debug: false
        }
    },

 

    scene: GameScene
};

 

// Start game
new Phaser.Game(config);

</script>

 

</body>
</html>
