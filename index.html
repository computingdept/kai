<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phaser Room Grid - Inventory Game</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
    body {
        margin: 0;
        background: #111;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    #gameWrapper {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    #inventory {
        width: 130px;
        background: #222;
        border: 2px solid white;
        padding: 10px;
        color: white;
        text-align: center;
    }

    #inventory h2 {
        font-size: 18px;
        margin: 0 0 10px 0;
    }

    #slots {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        justify-items: center;
    }

    .slot {
        width: 30px;
        height: 30px;
        background: #444;
        border: 2px solid #aaa;
        cursor: pointer;
    }

    canvas {
        border: 2px solid white;
    }
</style>
</head>

<body>

<div id="gameWrapper">

    <div id="inventory">
        <h2>Inventory</h2>

        <div id="slots">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <div id="gameContainer"></div>

</div>

<script>

// =====================================================
// ROOM SETTINGS
// =====================================================

const TILE_SIZE = 64;
const ROOM_SIZE = 10;
const ROOM_PIXELS = ROOM_SIZE * TILE_SIZE;

const WORLD_WIDTH = 10;
const WORLD_HEIGHT = 10;

// Win / lose positions
const WIN_X = ROOM_PIXELS / 2 - 100;
const WIN_Y = ROOM_PIXELS / 2;

const LOSE_X = ROOM_PIXELS / 2 + 100;
const LOSE_Y = ROOM_PIXELS / 2;

const END_DISTANCE = 35;

// Collectible colours
const ITEM_COLOURS = [
    0xff0000, // red
    0x00ff00, // green
    0x0000ff, // blue
    0xffff00, // yellow
    0xff00ff, // pink
    0x00ffff, // cyan
    0xff9900, // orange
    0xffffff, // white
    0x9966ff  // purple
];


// =====================================================
// SCENE
// =====================================================

class GameScene extends Phaser.Scene {

    constructor() {
        super();

        this.roomX = 0;
        this.roomY = 0;
    }

    create() {

        this.cursors = this.input.keyboard.createCursorKeys();

        this.wallGroup = this.physics.add.staticGroup();

        // Inventory setup
        this.inventory = [];
        this.inventorySlots = document.querySelectorAll(".slot");

        // Remember original collected items
        this.collectedRooms = new Set();

        // Remember dropped items in each room
        this.droppedItemsByRoom = {};

        // Groups
        this.itemGroup = this.physics.add.group();
        this.droppedGroup = this.physics.add.group();

        // Allow inventory slots to be clicked
        this.inventorySlots.forEach((slot, index) => {
            slot.addEventListener("click", () => {
                this.dropInventoryItem(index);
            });
        });

        // Room label
        this.roomText = this.add.text(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2,
            "",
            {
                fontSize: "36px",
                color: "#ffffff"
            }
        );

        this.roomText.setOrigin(0.5);

        // Win and lose markers
        this.winPad = this.add.circle(WIN_X, WIN_Y, 25, 0x00ff00);
        this.losePad = this.add.circle(LOSE_X, LOSE_Y, 25, 0xff0000);

        this.winPad.setVisible(false);
        this.losePad.setVisible(false);

        // Draw starting room
        this.drawRoom();

        // Create player
        this.createPlayerCharacter(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2
        );

        this.physics.add.existing(this.player);

        this.player.body.setSize(30, 44);
        this.player.body.setOffset(-15, -24);

        this.player.body.setCollideWorldBounds(false);

        // Player collides with walls
        this.physics.add.collider(
            this.player,
            this.wallGroup
        );

        // Player collects normal items
        this.physics.add.overlap(
            this.player,
            this.itemGroup,
            this.collectItem,
            null,
            this
        );

        // Player collects dropped items
        this.physics.add.overlap(
            this.player,
            this.droppedGroup,
            this.collectDroppedItem,
            null,
            this
        );
    }


    // =====================================================
    // PLAYER CHARACTER
    // =====================================================

    createPlayerCharacter(x, y) {

        this.player = this.add.container(x, y);

        this.shadow = this.add.ellipse(
            0,
            25,
            36,
            10,
            0x000000,
            0.35
        );

        this.leftLeg = this.add.rectangle(
            -7,
            20,
            8,
            24,
            0x1f3a5f
        );

        this.rightLeg = this.add.rectangle(
            7,
            20,
            8,
            24,
            0x1f3a5f
        );

        this.bodyShape = this.add.rectangle(
            0,
            0,
            26,
            32,
            0x1abc9c
        );

        this.leftArm = this.add.rectangle(
            -18,
            0,
            7,
            24,
            0xffcc99
        );

        this.rightArm = this.add.rectangle(
            18,
            0,
            7,
            24,
            0xffcc99
        );

        this.head = this.add.circle(
            0,
            -25,
            14,
            0xffcc99
        );

        this.hair = this.add.rectangle(
            0,
            -36,
            22,
            7,
            0x3b2414
        );

        this.leftEye = this.add.circle(
            -5,
            -26,
            2,
            0x000000
        );

        this.rightEye = this.add.circle(
            5,
            -26,
            2,
            0x000000
        );

        this.hat = this.add.rectangle(
            0,
            -45,
            20,
            10,
            0xff00ff
        );

        this.hat2 = this.add.rectangle(
            0,
            -40,
            30,
            5,
            0xff00ff
        );

        this.player.add([
            this.shadow,
            this.leftLeg,
            this.rightLeg,
            this.leftArm,
            this.rightArm,
            this.bodyShape,
            this.head,
            this.hair,
            this.leftEye,
            this.rightEye,
            this.hat,
            this.hat2
        ]);

        this.walkTimer = 0;
        this.walkFrame = 0;
    }


    animatePlayer(isMoving, delta) {

        if (isMoving) {

            this.walkTimer += delta;

            if (this.walkTimer > 120) {
                this.walkTimer = 0;
                this.walkFrame = 1 - this.walkFrame;
            }

            if (this.walkFrame === 0) {
                this.leftLeg.y = 18;
                this.rightLeg.y = 23;

                this.leftArm.y = 4;
                this.rightArm.y = -4;
            }
            else {
                this.leftLeg.y = 23;
                this.rightLeg.y = 18;

                this.leftArm.y = -4;
                this.rightArm.y = 4;
            }

            this.bodyShape.y = -2;
            this.head.y = -27;
            this.hair.y = -38;
            this.leftEye.y = -28;
            this.rightEye.y = -28;
        }
        else {
            this.leftLeg.y = 20;
            this.rightLeg.y = 20;

            this.leftArm.y = 0;
            this.rightArm.y = 0;

            this.bodyShape.y = 0;
            this.head.y = -25;
            this.hair.y = -36;
            this.leftEye.y = -26;
            this.rightEye.y = -26;
        }
    }


    // =====================================================
    // ROOM LABEL
    // =====================================================

    updateRoomLabel() {

        const letter = String.fromCharCode(65 + this.roomX);
        const number = this.roomY + 1;

        this.roomText.setText(`${letter}${number}`);
    }


    // =====================================================
    // WALL CREATION
    // =====================================================

    createWall(x, y) {

        const wall = this.add.rectangle(
            x,
            y,
            TILE_SIZE,
            TILE_SIZE,
            0x666666
        );

        this.physics.add.existing(wall, true);
        this.wallGroup.add(wall);
    }


    // =====================================================
    // INVENTORY
    // =====================================================

    updateInventoryDisplay() {

        this.inventorySlots.forEach(slot => {
            slot.style.backgroundColor = "#444";
        });

        this.inventory.forEach((colour, index) => {
            this.inventorySlots[index].style.backgroundColor =
                "#" + colour.toString(16).padStart(6, "0");
        });
    }


    dropInventoryItem(slotIndex) {

        // Only drop if there is an item in that slot
        if (slotIndex >= this.inventory.length) {
            return;
        }

        const colour = this.inventory[slotIndex];

        const roomKey = `${this.roomX},${this.roomY}`;

        if (!this.droppedItemsByRoom[roomKey]) {
            this.droppedItemsByRoom[roomKey] = [];
        }

        // Work out which tile the player is standing on
        const tileX = Math.floor(this.player.x / TILE_SIZE);
        const tileY = Math.floor(this.player.y / TILE_SIZE);

        // Drop in the centre of that tile
        const dropX = tileX * TILE_SIZE + TILE_SIZE / 2;
        const dropY = tileY * TILE_SIZE + TILE_SIZE / 2;

        this.droppedItemsByRoom[roomKey].push({
            x: dropX,
            y: dropY,
            colour: colour
        });

        // Remove item from inventory
        this.inventory.splice(slotIndex, 1);

        this.updateInventoryDisplay();

        this.createDroppedItems();
    }


    // =====================================================
    // COLLECTIBLE ITEMS
    // =====================================================

    createRoomItems() {

        this.itemGroup.clear(true, true);

        const roomKey = `${this.roomX},${this.roomY}`;

        // Spread items around the map
        const itemRooms = {
            "1,0": 0, // B1 red
            "3,2": 1, // D3 green
            "5,1": 2, // F2 blue
            "2,4": 3, // C5 yellow
            "7,3": 4, // H4 pink
            "4,6": 5, // E7 cyan
            "8,5": 6, // I6 orange
            "6,8": 7, // G9 white
            "9,9": 8  // J10 purple
        };

        if (!(roomKey in itemRooms)) {
            return;
        }

        if (this.collectedRooms.has(roomKey)) {
            return;
        }

        const itemIndex = itemRooms[roomKey];
        const colour = ITEM_COLOURS[itemIndex];

        const item = this.add.circle(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2 + 100,
            18,
            colour
        );

        item.itemColour = colour;
        item.roomKey = roomKey;

        this.physics.add.existing(item);
        this.itemGroup.add(item);
    }


    collectItem(player, item) {

        if (this.inventory.length >= 9) {
            return;
        }

        this.inventory.push(item.itemColour);

        this.updateInventoryDisplay();

        this.collectedRooms.add(item.roomKey);

        item.destroy();
    }


    // =====================================================
    // DROPPED ITEMS
    // =====================================================

    createDroppedItems() {

        this.droppedGroup.clear(true, true);

        const roomKey = `${this.roomX},${this.roomY}`;

        const droppedItems = this.droppedItemsByRoom[roomKey] || [];

        droppedItems.forEach((itemData, index) => {

            const item = this.add.rectangle(
                itemData.x,
                itemData.y,
                28,
                28,
                itemData.colour
            );

            item.itemColour = itemData.colour;
            item.roomKey = roomKey;
            item.dropIndex = index;

            this.physics.add.existing(item);
            this.droppedGroup.add(item);
        });
    }


    collectDroppedItem(player, item) {

        if (this.inventory.length >= 9) {
            return;
        }

        this.inventory.push(item.itemColour);

        this.updateInventoryDisplay();

        const droppedItems = this.droppedItemsByRoom[item.roomKey];

        if (droppedItems) {
            droppedItems.splice(item.dropIndex, 1);
        }

        item.destroy();

        this.createDroppedItems();
    }


    // =====================================================
    // ROOM DRAWING
    // =====================================================

    drawRoom() {

        this.wallGroup.clear(true, true);

        const gap = Math.floor(ROOM_SIZE / 2);

        const hasNorth = this.roomY > 0;
        const hasSouth = this.roomY < WORLD_HEIGHT - 1;
        const hasWest = this.roomX > 0;
        const hasEast = this.roomX < WORLD_WIDTH - 1;

        // Top and bottom walls
        for (let x = 0; x < ROOM_SIZE; x++) {

            if (!(hasNorth && x === gap)) {
                this.createWall(
                    x * TILE_SIZE + TILE_SIZE / 2,
                    TILE_SIZE / 2
                );
            }

            if (!(hasSouth && x === gap)) {
                this.createWall(
                    x * TILE_SIZE + TILE_SIZE / 2,
                    ROOM_PIXELS - TILE_SIZE / 2
                );
            }
        }

        // Left and right walls
        for (let y = 1; y < ROOM_SIZE - 1; y++) {

            if (!(hasWest && y === gap)) {
                this.createWall(
                    TILE_SIZE / 2,
                    y * TILE_SIZE + TILE_SIZE / 2
                );
            }

            if (!(hasEast && y === gap)) {
                this.createWall(
                    ROOM_PIXELS - TILE_SIZE / 2,
                    y * TILE_SIZE + TILE_SIZE / 2
                );
            }
        }

        const isFinalRoom =
            this.roomX === WORLD_WIDTH - 1 &&
            this.roomY === WORLD_HEIGHT - 1;

        this.winPad.setVisible(isFinalRoom);
        this.losePad.setVisible(isFinalRoom);

        this.createRoomItems();
        this.createDroppedItems();

        this.updateRoomLabel();
    }


    // =====================================================
    // ROOM TRANSITIONS
    // =====================================================

    moveToRoom(dx, dy) {

        this.roomX += dx;
        this.roomY += dy;

        this.drawRoom();

        if (dx === 1) {
            this.player.x = TILE_SIZE * 1.5;
        }

        if (dx === -1) {
            this.player.x = ROOM_PIXELS - TILE_SIZE * 1.5;
        }

        if (dy === 1) {
            this.player.y = TILE_SIZE * 1.5;
        }

        if (dy === -1) {
            this.player.y = ROOM_PIXELS - TILE_SIZE * 1.5;
        }
    }


    // =====================================================
    // GAME LOOP
    // =====================================================

    update(time, delta) {

        const speed = 220;
        let isMoving = false;

        this.player.body.setVelocity(0);

        if (this.cursors.left.isDown) {
            this.player.body.setVelocityX(-speed);
            this.player.scaleX = -1;
            isMoving = true;
        }

        if (this.cursors.right.isDown) {
            this.player.body.setVelocityX(speed);
            this.player.scaleX = 1;
            isMoving = true;
        }

        if (this.cursors.up.isDown) {
            this.player.body.setVelocityY(-speed);
            isMoving = true;
        }

        if (this.cursors.down.isDown) {
            this.player.body.setVelocityY(speed);
            isMoving = true;
        }

        this.animatePlayer(isMoving, delta);


        // -------------------------
        // ROOM CHANGES
        // -------------------------

        if (
            this.player.x < 0 &&
            this.roomX > 0
        ) {
            this.moveToRoom(-1, 0);
        }

        if (
            this.player.x > ROOM_PIXELS &&
            this.roomX < WORLD_WIDTH - 1
        ) {
            this.moveToRoom(1, 0);
        }

        if (
            this.player.y < 0 &&
            this.roomY > 0
        ) {
            this.moveToRoom(0, -1);
        }

        if (
            this.player.y > ROOM_PIXELS &&
            this.roomY < WORLD_HEIGHT - 1
        ) {
            this.moveToRoom(0, 1);
        }


        // -------------------------
        // END SCENE
        // -------------------------

        if (
            this.roomX === WORLD_WIDTH - 1 &&
            this.roomY === WORLD_HEIGHT - 1 &&
            Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                WIN_X,
                WIN_Y
            ) <= END_DISTANCE
        ) {
            alert("You win! Thanks for playing");
            this.scene.stop();
            return;
        }

        if (
            this.roomX === WORLD_WIDTH - 1 &&
            this.roomY === WORLD_HEIGHT - 1 &&
            Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                LOSE_X,
                LOSE_Y
            ) <= END_DISTANCE
        ) {
            alert("You lose! Better luck next time");
            this.scene.stop();
            return;
        }
    }
}


// =====================================================
// GAME CONFIG
// =====================================================

const config = {
    type: Phaser.AUTO,
    parent: "gameContainer",

    width: ROOM_PIXELS,
    height: ROOM_PIXELS,

    backgroundColor: "#202020",

    physics: {
        default: "arcade",
        arcade: {
            debug: false
        }
    },

    scene: GameScene
};

new Phaser.Game(config);

</script>

</body>
</html>
