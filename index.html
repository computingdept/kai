<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phaser Room Grid - Wizard Class Game</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
    body {
        margin: 0;
        background: #111;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    #gameWrapper {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    #inventory {
        width: 160px;
        background: #222;
        border: 2px solid white;
        padding: 12px;
        color: white;
        text-align: center;
    }

    #inventory h2 {
        font-size: 20px;
        margin: 0 0 10px 0;
    }

    #wizardChoices {
        display: grid;
        grid-template-columns: repeat(2, 50px);
        grid-template-rows: repeat(2, 50px);
        gap: 8px;
        justify-content: center;
        margin-bottom: 10px;
    }

    .wizard-choice {
        width: 50px;
        height: 50px;
        border: 2px solid #aaa;
        background: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }

    .wizard-choice.selected {
        border: 3px solid white;
        background: #555;
    }

    .wizard-icon {
        width: 26px;
        height: 38px;

        mask-image: url("wizard.png");
        mask-size: contain;
        mask-repeat: no-repeat;
        mask-position: center;

        -webkit-mask-image: url("wizard.png");
        -webkit-mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-position: center;
    }

    .wizard-red {
        background: #ff3333;
    }

    .wizard-green {
        background: #33ff66;
    }

    .wizard-blue {
        background: #3399ff;
    }

    .wizard-yellow {
        background: #ffff33;
    }

    #wizardStats {
        font-size: 13px;
        background: #333;
        border: 1px solid #777;
        padding: 6px;
        margin-bottom: 12px;
        min-height: 38px;
    }

    #slots {
        display: grid;
        grid-template-columns: repeat(3, 36px);
        gap: 8px;
        justify-content: center;
    }

    .slot {
        width: 36px;
        height: 36px;
        background: #444;
        border: 2px solid #aaa;
        cursor: pointer;
    }

    canvas {
        border: 2px solid white;
    }
</style>
</head>

<body>

<div id="gameWrapper">

    <div id="inventory">
        <h2>Inventory</h2>

        <div id="wizardChoices">
            <div class="wizard-choice" data-wizard="0">
                <div class="wizard-icon wizard-red"></div>
            </div>

            <div class="wizard-choice" data-wizard="1">
                <div class="wizard-icon wizard-green"></div>
            </div>

            <div class="wizard-choice" data-wizard="2">
                <div class="wizard-icon wizard-blue"></div>
            </div>

            <div class="wizard-choice" data-wizard="3">
                <div class="wizard-icon wizard-yellow"></div>
            </div>
        </div>

        <div id="wizardStats">
            Choose a wizard
        </div>

        <div id="slots">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <div id="gameContainer"></div>

</div>

<script>

// =====================================================
// WIZARD CLASS DATA
// =====================================================

class WizardType {

    constructor(name, colour, speed, displayWidth, displayHeight, bodyWidth, bodyHeight) {
        this.name = name;
        this.colour = colour;
        this.speed = speed;

        this.displayWidth = displayWidth;
        this.displayHeight = displayHeight;

        this.bodyWidth = bodyWidth;
        this.bodyHeight = bodyHeight;
    }
}

const WIZARD_CLASSES = [
    new WizardType(
        "Fire Wizard",
        0xff3333,
        220,
        34,
        52,
        22,
        34
    ),

    new WizardType(
        "Forest Wizard",
        0x33ff66,
        250,
        32,
        50,
        20,
        32
    ),

    new WizardType(
        "Frost Wizard",
        0x3399ff,
        190,
        38,
        54,
        24,
        36
    ),

    new WizardType(
        "Storm Wizard",
        0xffff33,
        280,
        30,
        48,
        18,
        30
    )
];


// =====================================================
// ROOM SETTINGS
// =====================================================

const TILE_SIZE = 64;
const ROOM_SIZE = 10;
const ROOM_PIXELS = ROOM_SIZE * TILE_SIZE;

const WORLD_WIDTH = 10;
const WORLD_HEIGHT = 10;

const WIN_X = ROOM_PIXELS / 2 - 100;
const WIN_Y = ROOM_PIXELS / 2;

const LOSE_X = ROOM_PIXELS / 2 + 100;
const LOSE_Y = ROOM_PIXELS / 2;

const END_DISTANCE = 35;

const ITEM_COLOURS = [
    0xff0000,
    0x00ff00,
    0x0000ff,
    0xffff00,
    0xff00ff,
    0x00ffff,
    0xff9900,
    0xffffff,
    0x9966ff
];


// =====================================================
// SCENE
// =====================================================

class GameScene extends Phaser.Scene {

    constructor() {
        super();

        this.roomX = 0;
        this.roomY = 0;

        this.currentWizardClass = WIZARD_CLASSES[0];
    }

    preload() {
        this.load.image("wizard", "wizard.png");
    }

    create() {

        this.cursors = this.input.keyboard.createCursorKeys();

        this.wallGroup = this.physics.add.staticGroup();

        this.inventory = [];
        this.inventorySlots = document.querySelectorAll(".slot");

        this.collectedRooms = new Set();
        this.droppedItemsByRoom = {};

        this.itemGroup = this.physics.add.group();
        this.droppedGroup = this.physics.add.group();

        this.inventorySlots.forEach((slot, index) => {
            slot.addEventListener("click", () => {
                this.dropInventoryItem(index);
            });
        });

        this.roomText = this.add.text(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2,
            "",
            {
                fontSize: "36px",
                color: "#ffffff"
            }
        );

        this.roomText.setOrigin(0.5);

        this.winPad = this.add.circle(WIN_X, WIN_Y, 25, 0x00ff00);
        this.losePad = this.add.circle(LOSE_X, LOSE_Y, 25, 0xff0000);

        this.winPad.setVisible(false);
        this.losePad.setVisible(false);

        this.drawRoom();

        this.createPlayerCharacter(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2
        );

        this.physics.add.existing(this.player);

        this.player.body.setCollideWorldBounds(false);

        this.applyWizardClass(this.currentWizardClass);

        this.setupWizardChoiceButtons();

        this.physics.add.collider(
            this.player,
            this.wallGroup
        );

        this.physics.add.overlap(
            this.player,
            this.itemGroup,
            this.collectItem,
            null,
            this
        );

        this.physics.add.overlap(
            this.player,
            this.droppedGroup,
            this.collectDroppedItem,
            null,
            this
        );
    }


    // =====================================================
    // PLAYER WIZARD
    // =====================================================

    createPlayerCharacter(x, y) {

        this.player = this.add.image(x, y, "wizard");

        // No setScale(1.5)
        // Size comes from the chosen wizard class.
        this.walkTimer = 0;
    }


    applyWizardClass(wizardClass) {

        this.currentWizardClass = wizardClass;

        this.player.setDisplaySize(
            wizardClass.displayWidth,
            wizardClass.displayHeight
        );

        this.player.setTintFill(wizardClass.colour);

        if (this.player.body) {

            // FIXED:
            // The third parameter true centres the body automatically.
            // This avoids offset problems.
            this.player.body.setSize(
                wizardClass.bodyWidth,
                wizardClass.bodyHeight,
                true
            );
        }

        const statsBox = document.querySelector("#wizardStats");

        statsBox.innerHTML = `
            <strong>${wizardClass.name}</strong><br>
            Speed: ${wizardClass.speed}
        `;
    }


    setupWizardChoiceButtons() {

        const buttons = document.querySelectorAll(".wizard-choice");

        buttons.forEach(button => {

            button.addEventListener("click", () => {

                const wizardIndex = Number(button.dataset.wizard);

                const selectedClass = WIZARD_CLASSES[wizardIndex];

                this.applyWizardClass(selectedClass);

                buttons.forEach(btn => {
                    btn.classList.remove("selected");
                });

                button.classList.add("selected");
            });
        });

        buttons[0].classList.add("selected");
    }


    animatePlayer(isMoving, delta) {

        if (isMoving) {
            this.walkTimer += delta;
            this.player.angle = Math.sin(this.walkTimer / 100) * 2;
        }
        else {
            this.player.angle = 0;
        }
    }


    updateRoomLabel() {

        const letter = String.fromCharCode(65 + this.roomX);
        const number = this.roomY + 1;

        this.roomText.setText(`${letter}${number}`);
    }


    createWall(x, y) {

        const wall = this.add.rectangle(
            x,
            y,
            TILE_SIZE,
            TILE_SIZE,
            0x666666
        );

        this.physics.add.existing(wall, true);
        this.wallGroup.add(wall);
    }


    updateInventoryDisplay() {

        this.inventorySlots.forEach(slot => {
            slot.style.backgroundColor = "#444";
        });

        this.inventory.forEach((colour, index) => {
            this.inventorySlots[index].style.backgroundColor =
                "#" + colour.toString(16).padStart(6, "0");
        });
    }


    dropInventoryItem(slotIndex) {

        if (slotIndex >= this.inventory.length) {
            return;
        }

        const colour = this.inventory[slotIndex];
        const roomKey = `${this.roomX},${this.roomY}`;

        if (!this.droppedItemsByRoom[roomKey]) {
            this.droppedItemsByRoom[roomKey] = [];
        }

        const tileX = Math.floor(this.player.x / TILE_SIZE);
        const tileY = Math.floor(this.player.y / TILE_SIZE);

        const dropX = tileX * TILE_SIZE + TILE_SIZE / 2;
        const dropY = tileY * TILE_SIZE + TILE_SIZE / 2;

        this.droppedItemsByRoom[roomKey].push({
            x: dropX,
            y: dropY,
            colour: colour,
            canPickupAt: this.time.now + 800
        });

        this.inventory.splice(slotIndex, 1);

        this.updateInventoryDisplay();
        this.createDroppedItems();
    }


    createRoomItems() {

        this.itemGroup.clear(true, true);

        const roomKey = `${this.roomX},${this.roomY}`;

        const itemRooms = {
            "1,0": 0,
            "3,2": 1,
            "5,1": 2,
            "2,4": 3,
            "7,3": 4,
            "4,6": 5,
            "8,5": 6,
            "6,8": 7,
            "9,9": 8
        };

        if (!(roomKey in itemRooms)) {
            return;
        }

        if (this.collectedRooms.has(roomKey)) {
            return;
        }

        const itemIndex = itemRooms[roomKey];
        const colour = ITEM_COLOURS[itemIndex];

        const item = this.add.circle(
            ROOM_PIXELS / 2,
            ROOM_PIXELS / 2 + 100,
            18,
            colour
        );

        item.itemColour = colour;
        item.roomKey = roomKey;

        this.physics.add.existing(item);

        // FIXED:
        // Make the physics body match the visible circle.
        item.body.setCircle(18);

        this.itemGroup.add(item);
    }


    collectItem(player, item) {

        if (this.inventory.length >= 9) {
            return;
        }

        this.inventory.push(item.itemColour);

        this.updateInventoryDisplay();

        this.collectedRooms.add(item.roomKey);

        item.destroy();
    }


    createDroppedItems() {

        this.droppedGroup.clear(true, true);

        const roomKey = `${this.roomX},${this.roomY}`;

        const droppedItems = this.droppedItemsByRoom[roomKey] || [];

        droppedItems.forEach((itemData, index) => {

            const item = this.add.rectangle(
                itemData.x,
                itemData.y,
                28,
                28,
                itemData.colour
            );

            item.itemColour = itemData.colour;
            item.roomKey = roomKey;
            item.dropIndex = index;
            item.canPickupAt = itemData.canPickupAt || 0;

            this.physics.add.existing(item);

            // Keep dropped item collision smaller and centred.
            item.body.setSize(24, 24, true);

            this.droppedGroup.add(item);
        });
    }


    collectDroppedItem(player, item) {

        if (this.time.now < item.canPickupAt) {
            return;
        }

        if (this.inventory.length >= 9) {
            return;
        }

        this.inventory.push(item.itemColour);

        this.updateInventoryDisplay();

        const droppedItems = this.droppedItemsByRoom[item.roomKey];

        if (droppedItems) {
            droppedItems.splice(item.dropIndex, 1);
        }

        item.destroy();

        this.createDroppedItems();
    }


    drawRoom() {

        this.wallGroup.clear(true, true);

        const gap = Math.floor(ROOM_SIZE / 2);

        const hasNorth = this.roomY > 0;
        const hasSouth = this.roomY < WORLD_HEIGHT - 1;
        const hasWest = this.roomX > 0;
        const hasEast = this.roomX < WORLD_WIDTH - 1;

        for (let x = 0; x < ROOM_SIZE; x++) {

            if (!(hasNorth && x === gap)) {
                this.createWall(
                    x * TILE_SIZE + TILE_SIZE / 2,
                    TILE_SIZE / 2
                );
            }

            if (!(hasSouth && x === gap)) {
                this.createWall(
                    x * TILE_SIZE + TILE_SIZE / 2,
                    ROOM_PIXELS - TILE_SIZE / 2
                );
            }
        }

        for (let y = 1; y < ROOM_SIZE - 1; y++) {

            if (!(hasWest && y === gap)) {
                this.createWall(
                    TILE_SIZE / 2,
                    y * TILE_SIZE + TILE_SIZE / 2
                );
            }

            if (!(hasEast && y === gap)) {
                this.createWall(
                    ROOM_PIXELS - TILE_SIZE / 2,
                    y * TILE_SIZE + TILE_SIZE / 2
                );
            }
        }

        const isFinalRoom =
            this.roomX === WORLD_WIDTH - 1 &&
            this.roomY === WORLD_HEIGHT - 1;

        this.winPad.setVisible(isFinalRoom);
        this.losePad.setVisible(isFinalRoom);

        this.createRoomItems();
        this.createDroppedItems();

        this.updateRoomLabel();
    }


    moveToRoom(dx, dy) {

        this.roomX += dx;
        this.roomY += dy;

        this.drawRoom();

        if (dx === 1) {
            this.player.x = TILE_SIZE * 1.5;
        }

        if (dx === -1) {
            this.player.x = ROOM_PIXELS - TILE_SIZE * 1.5;
        }

        if (dy === 1) {
            this.player.y = TILE_SIZE * 1.5;
        }

        if (dy === -1) {
            this.player.y = ROOM_PIXELS - TILE_SIZE * 1.5;
        }

        // Stop movement carrying through weirdly after changing rooms.
        this.player.body.setVelocity(0);
    }


    update(time, delta) {

        const speed = this.currentWizardClass.speed;
        let isMoving = false;

        this.player.body.setVelocity(0);

        if (this.cursors.left.isDown) {
            this.player.body.setVelocityX(-speed);
            this.player.setFlipX(true);
            isMoving = true;
        }

        if (this.cursors.right.isDown) {
            this.player.body.setVelocityX(speed);
            this.player.setFlipX(false);
            isMoving = true;
        }

        if (this.cursors.up.isDown) {
            this.player.body.setVelocityY(-speed);
            isMoving = true;
        }

        if (this.cursors.down.isDown) {
            this.player.body.setVelocityY(speed);
            isMoving = true;
        }

        // FIXED:
        // Stops diagonal movement being faster.
        if (isMoving) {
            this.player.body.velocity.normalize().scale(speed);
        }

        this.animatePlayer(isMoving, delta);


        // -------------------------
        // ROOM CHANGES
        // -------------------------

        if (
            this.player.x < 0 &&
            this.roomX > 0
        ) {
            this.moveToRoom(-1, 0);
        }

        if (
            this.player.x > ROOM_PIXELS &&
            this.roomX < WORLD_WIDTH - 1
        ) {
            this.moveToRoom(1, 0);
        }

        if (
            this.player.y < 0 &&
            this.roomY > 0
        ) {
            this.moveToRoom(0, -1);
        }

        if (
            this.player.y > ROOM_PIXELS &&
            this.roomY < WORLD_HEIGHT - 1
        ) {
            this.moveToRoom(0, 1);
        }


        // -------------------------
        // WIN / LOSE CHECK
        // -------------------------

        if (
            this.roomX === WORLD_WIDTH - 1 &&
            this.roomY === WORLD_HEIGHT - 1 &&
            Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                WIN_X,
                WIN_Y
            ) <= END_DISTANCE
        ) {
            alert("You win! Thanks for playing");
            this.scene.stop();
            return;
        }

        if (
            this.roomX === WORLD_WIDTH - 1 &&
            this.roomY === WORLD_HEIGHT - 1 &&
            Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                LOSE_X,
                LOSE_Y
            ) <= END_DISTANCE
        ) {
            alert("You lose! Better luck next time");
            this.scene.stop();
            return;
        }
    }
}


// =====================================================
// GAME CONFIG
// =====================================================

const config = {
    type: Phaser.AUTO,
    parent: "gameContainer",

    width: ROOM_PIXELS,
    height: ROOM_PIXELS,

    backgroundColor: "#202020",

    physics: {
        default: "arcade",
        arcade: {
            debug: false
        }
    },

    scene: GameScene
};

new Phaser.Game(config);

</script>

</body>
</html>
